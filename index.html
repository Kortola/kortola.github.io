<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kortola | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .modal { display: none; background: rgba(255,255,255,0.98); }
        .modal.active { display: flex; }
        .animate-fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-zinc-800">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-zinc-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl tracking-widest uppercase font-light">Kortola</h1>
            <div class="space-x-8 text-[10px] uppercase tracking-[0.2em] font-medium">
                <a href="#paintings" class="hover:text-zinc-400 transition">Paintings</a>
                <a href="#about" class="hover:text-zinc-400 transition">About</a>
                <a href="#contact" class="hover:text-zinc-400 transition">Contact</a>
            </div>
        </div>
    </nav>

    <section id="paintings" class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </section>

    <section id="about" class="py-24 bg-zinc-50 border-y border-zinc-100">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <h2 class="text-2xl font-light mb-8 uppercase tracking-[0.3em]">About the Artist</h2>
            <p class="text-lg leading-relaxed text-zinc-500 font-light">
                Creating atmosphere through texture and light. Based on a passion for traditional techniques translated into a modern aesthetic.
            </p>
        </div>
    </section>

    <section id="contact" class="py-24">
        <div class="max-w-xl mx-auto px-6 text-center">
            <h2 class="text-2xl font-light mb-8 uppercase tracking-[0.3em]">Contact</h2>
            <p class="mb-8 text-zinc-400">For inquiries and acquisitions</p>
            <a href="mailto:your-email@example.com" class="text-lg border-b border-zinc-900 pb-1 hover:text-zinc-400 hover:border-zinc-400 transition">Email Me</a>
        </div>
    </section>

    <div id="modal" class="modal fixed inset-0 z-[100] p-6 flex-col items-center overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-8 right-8 text-4xl font-light hover:rotate-90 transition duration-300">&times;</button>
        <div class="max-w-4xl w-full mt-20">
            <div id="modal-images" class="space-y-8 mb-12"></div>
            <div class="border-t border-zinc-100 pt-8 pb-32">
                <h2 id="modal-title" class="text-3xl font-light mb-2 tracking-tight"></h2>
                <p id="modal-material" class="text-zinc-400 italic mb-6 text-sm"></p>
                <p id="modal-desc" class="text-lg leading-relaxed text-zinc-600 font-light"></p>
            </div>
        </div>
    </div>

    <script>
        // 1. REPLACE THIS WITH YOUR ID
        const sheetID = '1vA5W3H03p_P3p3P3p3P3p3P3p3P3p'; // Replace with the ID from your URL
        const sheetURL = `https://docs.google.com/spreadsheets/d/${1iJmTnFVTH3Gtr1iz4E9F4iF1a9KCju-5h7XMnzL5cig}/gviz/tq?tqx=out:csv&cb=${Date.now()}`;

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                
                // Better CSV parser to handle quotes and commas
                const rows = csvText.split(/\r?\n/).map(line => {
                    const result = [];
                    let cell = '', inQuotes = false;
                    for (let char of line) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { result.push(cell); cell = ''; }
                        else cell += char;
                    }
                    result.push(cell);
                    return result;
                }).slice(1); // Skip header

                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';

                rows.forEach(row => {
                    const title = row[0]?.replace(/^"|"$/g, '') || 'Untitled';
                    const imagesStr = row[1]?.replace(/^"|"$/g, '') || '';
                    const material = row[2]?.replace(/^"|"$/g, '') || '';
                    const desc = row[3]?.replace(/^"|"$/g, '') || '';

                    if (!imagesStr) return;

                    const imageArray = imagesStr.split(',').map(s => s.trim());
                    const mainImg = imageArray[0];

                    const item = document.createElement('div');
                    item.className = "cursor-pointer group animate-fade-in";
                    item.onclick = () => openModal(title, imageArray, material, desc);
                    item.innerHTML = `
                        <div class="aspect-[4/5] overflow-hidden bg-zinc-50 border border-zinc-100">
                            <img src="${mainImg}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition duration-[1.5s] ease-out">
                        </div>
                        <div class="mt-6">
                            <h3 class="text-xs tracking-[0.2em] uppercase font-medium">${title}</h3>
                            <p class="text-[10px] text-zinc-400 mt-2 uppercase tracking-widest">${material}</p>
                        </div>
                    `;
                    gallery.appendChild(item);
                });
            } catch (e) {
                console.error("Layout error:", e);
            }
        }

        function openModal(title, images, material, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-material').innerText = material;
            document.getElementById('modal-desc').innerText = desc;
            const container = document.getElementById('modal-images');
            container.innerHTML = '';
            images.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "w-full shadow-2xl";
                container.appendChild(img);
            });
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onload = loadData;
    </script>
</body>
</html>
