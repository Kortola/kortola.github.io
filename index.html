<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .modal { display: none; background: rgba(255,255,255,0.98); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-white text-zinc-800">

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-zinc-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl tracking-widest uppercase font-light">Your Name</h1>
            <div class="space-x-8 text-sm uppercase tracking-wider font-medium">
                <a href="#paintings" class="hover:text-zinc-500">Paintings</a>
                <a href="#about" class="hover:text-zinc-500">About</a>
                <a href="#contact" class="hover:text-zinc-500">Contact</a>
            </div>
        </div>
    </nav>

    <section id="paintings" class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </section>

    <section id="about" class="py-20 bg-zinc-50">
        <div class="max-w-3xl mx-auto px-6 text-center">
            <h2 class="text-3xl font-light mb-8 uppercase tracking-widest">About the Artist</h2>
            <p class="text-lg leading-relaxed text-zinc-600">
                [Insert your story here. Describe your technique, your passion for color, and what drives your creative process.]
            </p>
        </div>
    </section>

    <section id="contact" class="py-20">
        <div class="max-w-xl mx-auto px-6 text-center">
            <h2 class="text-3xl font-light mb-8 uppercase tracking-widest">Contact</h2>
            <p class="mb-6">For inquiries or commissions:</p>
            <a href="mailto:your@email.com" class="text-xl border-b border-zinc-900 pb-1 hover:text-zinc-500 hover:border-zinc-500 transition">your@email.com</a>
        </div>
    </section>

    <div id="modal" class="modal fixed inset-0 z-[100] p-6 flex-col items-center overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-8 right-8 text-3xl font-light">&times;</button>
        <div class="max-w-4xl w-full mt-20">
            <div id="modal-images" class="space-y-6 mb-12"></div>
            <div class="border-t pt-8 pb-20">
                <h2 id="modal-title" class="text-4xl font-light mb-2"></h2>
                <p id="modal-material" class="text-zinc-400 italic mb-4"></p>
                <p id="modal-desc" class="text-lg leading-relaxed max-w-2xl"></p>
            </div>
        </div>
    </div>

    <script>
        // Use the "gviz" version of the link for better compatibility
const sheetURL = 'https://docs.google.com/spreadsheets/d/1iJmTnFVTH3Gtr1iz4E9F4iF1a9KCju-5h7XMnzL5cig/gviz/tq?tqx=out:csv&cacheBust=${Date.now()}`;

async function loadData(retries = 3) {
    const gallery = document.getElementById('gallery');
    console.log(`Attempting to load gallery... (${4 - retries} attempt)`);

    try {
        const response = await fetch(sheetURL);
        if (!response.ok) throw new Error('Google Sheets is busy');
        
        const csvText = await response.text();
        
        // Check if the data is actually CSV and not an HTML error page
        if (csvText.includes('<!DOCTYPE html>')) {
            throw new Error('Received HTML instead of CSV. Check if sheet is Published to Web.');
        }

        const rows = csvText.split('\n').map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim())
        );

        gallery.innerHTML = ''; 
        // ... (rest of your loop code to build the gallery cards) ...
        
        console.log("Gallery loaded successfully!");
        if(document.getElementById('loader')) document.getElementById('loader').style.display = 'none';

    } catch (error) {
        console.error("Fetch error:", error);
        if (retries > 0) {
            console.log("Retrying in 2 seconds...");
            setTimeout(() => loadData(retries - 1), 2000);
        } else {
            gallery.innerHTML = `<div class="col-span-full text-center py-20">
                <p class="text-red-400">The gallery is taking a moment to wake up.</p>
                <button onclick="location.reload()" class="mt-4 px-4 py-2 border border-zinc-900 uppercase text-xs tracking-widest">Refresh Gallery</button>
            </div>`;
        }
    }
}
// Keep your openModal and closeModal functions here...
loadData();
    </script>
</body>
</html>
