<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karina Ortola | Artist Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        /* Modern Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #18181b; line-height: 1.6; }
        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #f4f4f5; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
     .logo { 
    font-size: 1.2rem; 
    font-weight: 300; 
    letter-spacing: 0.3em; 
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
}
        .nav-links a { text-decoration: none; color: #18181b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; margin-left: 2rem; transition: color 0.3s; font-weight: 500; }
        .nav-links a:hover { color: #a1a1aa; }
        /* Gallery Grid */
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 4rem; max-width: 1200px; margin: 9rem auto 5rem; padding: 0 2rem; }
        .art-card { cursor: pointer; opacity: 0; transform: translateY(20px); animation: fadeIn 0.8s ease forwards; }
        .img-container { aspect-ratio: 4/5; overflow: hidden; background: #fafafa; border: 1px solid #f4f4f5; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .art-card:hover img { transform: scale(1.06); }
        .art-info { margin-top: 1.5rem; text-align: left; }
        .art-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; margin-bottom: 0.5rem; }
        .art-material { font-size: 11px; color: #71717a; font-style: italic; font-weight: 300; }
        /* Sections */
        section { padding: 6rem 2rem; border-top: 1px solid #f4f4f5; text-align: center; }
        .section-title { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 3rem; }
        .about-text { max-width: 650px; margin: 0 auto; color: #52525b; font-weight: 300; font-size: 1.1rem; }
        /* Full-Screen Modal */
        #modal { display: none; position: fixed; inset: 0; background: #ffffff; z-index: 200; overflow-y: auto; padding: 0; }
        #modal.active { display: block; }
        .close-btn { position: fixed; top: 2rem; right: 2rem; font-size: 2.5rem; border: none; background: none; cursor: pointer; z-index: 210; }
        .modal-content { max-width: 1000px; margin: 6rem auto; padding: 0 2rem; }
        .modal-image { width:70%; margin-bottom: 3rem; display: block; }
        
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            #gallery { grid-template-columns: 1fr; margin-top: 7rem; }
            .nav-links { display: none; }
        }
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200&display=swap" rel="stylesheet">
    </style>
</head>
<body>
   <nav>
    <div class="nav-container">
        <div class="logo">Karina Ortola</div>
        <div class="nav-links">
            <a href="#gallery">Paintings</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
</nav>
    <main id="gallery">
        <p style="text-align: center; grid-column: 1/-1;">Loading gallery...</p>
    </main>
    <section id="about">
        <h2 class="section-title">About the Artist</h2>
        <p class="about-text">Exploring light and texture through a modern lens.</p>
    </section>
    <section id="contact">
        <h2 class="section-title">Contact</h2>
        <a href="mailto:your-email@example.com" style="color:#18181b; text-decoration: none; border-bottom: 1px solid #18181b;">Email the Studio</a>
    </section>
    <div id="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-content">
            <div id="modal-images"></div>
            <div class="modal-details">
                <h2 id="modal-title" class="section-title" style="text-align:left; margin-bottom:1rem;"></h2>
                <p id="modal-material" style="color:#71717a; margin-bottom:1.5rem;"></p>
                <p id="modal-desc" class="about-text" style="text-align:left; margin:0;"></p>
            </div>
        </div>
    </div>
    <script>
    const sheetID = '1iJmTnFVTH3Gtr1iz4E9F4iF1a9KCju-5h7XMnzL5cig'; 
    const sheetURL = 'https://docs.google.com/spreadsheets/d/' + sheetID + '/export?format=csv&id=' + sheetID + '&gid=0';

    async function loadData() {
        const gallery = document.getElementById('gallery');
        try {
            const response = await fetch(sheetURL + '&cb=' + Date.now());
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").map(row => row.split(','));
            
            gallery.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const title = (row[0] || "").replace(/"/g, '').trim();
                let imgRaw = (row[1] || "").replace(/"/g, '').trim();
                const material = (row[2] || "").replace(/"/g, '').trim();
                const desc = (row[3] || "").replace(/"/g, '').trim();

                if (!imgRaw) continue;

                // --- THE SEMICOLON FIX ---
                // This creates an "Array" (list) of links
                let imgList = imgRaw.split(';').map(link => {
                    let cleanLink = link.trim();
                    if (cleanLink.includes('github.com') && cleanLink.includes('/blob/')) {
                        return cleanLink.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                    }
                    return cleanLink;
                });

                const mainImg = imgList[0]; // The first image is the thumbnail

                const card = document.createElement('div');
                card.className = 'art-card';
                // We pass the WHOLE list to the modal
                card.onclick = () => openModal(title, imgList, material, desc);
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${mainImg}" onerror="this.src='https://via.placeholder.com/600x800?text=Check+Link'">
                    </div>
                    <div class="art-info">
                        <h3 class="art-title">${title}</h3>
                        <p class="art-material">${material}</p>
                    </div>
                `;
                gallery.appendChild(card);
            }
        } catch (error) {
            gallery.innerHTML = `<p style="grid-column: 1/-1;">Error: ${error.message}</p>`;
        }
    }

    function openModal(title, images, material, desc) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-material').innerText = material;
        document.getElementById('modal-desc').innerText = desc;
        const container = document.getElementById('modal-images');
        container.innerHTML = '';
        
        // This loops through all images in your semicolon list
        images.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.className = "modal-image";
            container.appendChild(img);
        });
        
        document.getElementById('modal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    window.onload = loadData;
</script>
</body>
</html>
