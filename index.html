<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karina Ortola | Artist Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        /* Modern Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #18181b; line-height: 1.6; }

        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #f4f4f5; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; }
        .nav-links a { text-decoration: none; color: #18181b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; margin-left: 2rem; transition: color 0.3s; font-weight: 500; }
        .nav-links a:hover { color: #a1a1aa; }

        /* Gallery Grid - The "White Cube" Museum Look */
        #gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 6rem; 
            max-width: 1300px; 
            margin: 10rem auto 8rem; 
            padding: 0 3rem; 
        }

        .art-card { 
            cursor: pointer; 
            opacity: 0; 
            animation: museumFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* The Drift Animation */
        @keyframes museumFadeIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .img-container { aspect-ratio: 4/5; overflow: hidden; background: #ffffff; border: none; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1); }
        .art-card:hover img { transform: scale(1.06); }

        .art-info { margin-top: 1.5rem; text-align: left; }
        .art-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; margin-bottom: 0.5rem; }
        .art-material { font-size: 11px; color: #71717a; font-style: italic; font-weight: 300; }

        /* Sections */
        section { padding: 6rem 2rem; border-top: 1px solid #f4f4f5; text-align: center; }
        .section-title { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 3rem; }
        .about-text { max-width: 650px; margin: 0 auto; color: #52525b; font-weight: 300; font-size: 1.1rem; }

        /* Centered Modal (Pop-up) */
        #modal { display: none; position: fixed; inset: 0; background: #ffffff; z-index: 200; overflow-y: auto; }
        #modal.active { display: block; }
        .close-btn { position: fixed; top: 2rem; right: 2rem; font-size: 2.5rem; border: none; background: none; cursor: pointer; z-index: 210; }

        .modal-content { max-width: 1000px; margin: 6rem auto; padding: 0 2rem; display: flex; flex-direction: column; align-items: center; }
        #modal-images { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 50px; margin-bottom: 4rem; }
        .modal-image { display: block; width: auto; max-width: 85%; max-height: 80vh; object-fit: contain; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        .modal-details { width: 100%; max-width: 600px; text-align: center; margin: 0 auto; padding-bottom: 8rem; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #gallery { grid-template-columns: 1fr; gap: 4rem; margin-top: 7rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo">Karina Ortola</div>
            <div class="nav-links">
                <a href="#gallery">Paintings</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </nav>

    <main id="gallery">
        <p style="text-align: center; grid-column: 1/-1;">Loading gallery...</p>
    </main>

    <section id="about">
        <h2 class="section-title">About the Artist</h2>
        <p class="about-text">Exploring light and texture through a modern lens.</p>
    </section>

    <section id="contact">
        <h2 class="section-title">Contact</h2>
        <a href="mailto:your-email@example.com" style="color:#18181b; text-decoration: none; border-bottom: 1px solid #18181b;">Email the Studio</a>
    </section>

    <div id="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-content">
            <div id="modal-images"></div>
            <div class="modal-details">
                <h2 id="modal-title" class="section-title" style="margin-bottom:1rem;"></h2>
                <p id="modal-material" style="color:#71717a; margin-bottom:1.5rem;"></p>
                <p id="modal-desc" class="about-text" style="margin:0;"></p>
            </div>
        </div>
    </div>
